spring:
  application:
    name: equity-trading-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/equity_trading?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:equity_app}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
server:
  port: 8080
