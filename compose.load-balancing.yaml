name: equity-trading

services:
  mysql:
    image: crpi-3jyk23pxhy24iane.cn-hangzhou.personal.cr.aliyuncs.com/zheng20260716/equity-trading-mysql:8.4
    restart: unless-stopped
    cpus: "0.50"
    mem_limit: 512m
    command: ["--innodb-buffer-pool-size=128M"]
    environment:
      MYSQL_DATABASE: "${MYSQL_DATABASE:-equity_trading}"
      MYSQL_USER: "${MYSQL_USER:-equity_app}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:?MYSQL_PASSWORD must be set in .env}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set in .env}"
    volumes:
      - mysql_data:/var/lib/mysql
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  api1:
    image: crpi-3jyk23pxhy24iane.cn-hangzhou.personal.cr.aliyuncs.com/zheng20260716/equity-trading-api:${API_IMAGE_TAG:-0.0.1}
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-equity_trading}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai"
      SPRING_DATASOURCE_USERNAME: "${MYSQL_USER:-equity_app}"
      SPRING_DATASOURCE_PASSWORD: "${MYSQL_PASSWORD:?MYSQL_PASSWORD must be set in .env}"
    depends_on:
      mysql:
        condition: service_healthy
    cpus: "0.75"
    mem_limit: 384m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://127.0.0.1:8080/api/v1/home"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s

  api2:
    image: crpi-3jyk23pxhy24iane.cn-hangzhou.personal.cr.aliyuncs.com/zheng20260716/equity-trading-api:${API_IMAGE_TAG:-0.0.1}
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-equity_trading}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai"
      SPRING_DATASOURCE_USERNAME: "${MYSQL_USER:-equity_app}"
      SPRING_DATASOURCE_PASSWORD: "${MYSQL_PASSWORD:?MYSQL_PASSWORD must be set in .env}"
    depends_on:
      mysql:
        condition: service_healthy
    cpus: "0.75"
    mem_limit: 384m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://127.0.0.1:8080/api/v1/home"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s

  web:
    image: crpi-3jyk23pxhy24iane.cn-hangzhou.personal.cr.aliyuncs.com/zheng20260716/equity-trading-web:${WEB_IMAGE_TAG:-0.0.5}
    restart: unless-stopped
    cpus: "0.50"
    mem_limit: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://127.0.0.1/"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  mysql_data:
