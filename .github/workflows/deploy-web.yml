name: Deploy Web

on:
  workflow_run:
    workflows: ["Deploy API"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SERVER_KNOWN_HOSTS: ${{ vars.SERVER_KNOWN_HOSTS }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          test -n "$SERVER_KNOWN_HOSTS"
          test -n "$SERVER_SSH_KEY"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SERVER_KNOWN_HOSTS" > ~/.ssh/known_hosts
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Copy deployment config
        env:
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          SERVER_USER: ${{ vars.SERVER_USER }}
        run: |
          test -n "$SERVER_HOST"
          test -n "$SERVER_USER"
          scp -i ~/.ssh/id_ed25519 compose.load-balancing.yaml "$SERVER_USER@$SERVER_HOST:/opt/equity-trading/compose.load-balancing.yaml"

      - name: Pull, restart and wait for Web health
        env:
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          SERVER_USER: ${{ vars.SERVER_USER }}
        run: |
          ssh -i ~/.ssh/id_ed25519 "$SERVER_USER@$SERVER_HOST" "bash -s" <<'REMOTE'
          set -euo pipefail
          cd /opt/equity-trading

          state_file=".api-release.env"
          if [ ! -s "$state_file" ]; then
            echo "Missing $state_file; Deploy API must succeed before Deploy Web" >&2
            exit 1
          fi
          source "$state_file"
          if [[ ! "${LAST_SUCCESSFUL_API_TAG:-}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "LAST_SUCCESSFUL_API_TAG must be a 40-character lowercase Git commit SHA" >&2
            exit 1
          fi
          export WEB_IMAGE_TAG="$LAST_SUCCESSFUL_API_TAG"
          echo "Deploying Web image tag: $WEB_IMAGE_TAG"

          docker compose -f compose.load-balancing.yaml config --quiet
          docker compose -f compose.load-balancing.yaml pull web
          docker compose -f compose.load-balancing.yaml up -d --no-deps web

          for attempt in $(seq 1 18); do
            status="$(docker inspect --format '{{.State.Health.Status}}' equity-trading-web-1 2>/dev/null || printf '%s' 'missing')"
            if [ "$status" = "healthy" ]; then
              echo "equity-trading-web-1 is healthy"
              exit 0
            fi
            echo "Waiting for equity-trading-web-1 to become healthy (current: $status, attempt: $attempt/18)"
            sleep 5
          done

          echo "equity-trading-web-1 did not become healthy in time" >&2
          exit 1
          REMOTE
